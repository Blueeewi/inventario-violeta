<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inventario Violeta – Reportes</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>🛍️ Inventario Violeta</header>
<nav class="navbar">
  <a href="/">Productos</a>
  <a href="/inventario.html">Inventario</a>
  <a href="/ventas.html">Ventas</a>
  <a href="/reportes.html" class="nav-activo">Reportes</a>
</nav>

<div class="contenido">

  <div class="cards-resumen">
    <div class="card-stat">
      <div class="label">Total ventas</div>
      <div class="valor" id="stat-ventas">—</div>
    </div>
    <div class="card-stat">
      <div class="label">Ingresos totales</div>
      <div class="valor" id="stat-ingresos">—</div>
    </div>
    <div class="card-stat">
      <div class="label">Comisiones totales</div>
      <div class="valor" id="stat-comisiones">—</div>
    </div>
  </div>

  <div class="barra-top reportes-barra">
    <div class="reportes-filtros">
      <input type="date" id="filtro-desde">
      <span class="filtro-separador">hasta</span>
      <input type="date" id="filtro-hasta">
      <button class="btn-filtrar" onclick="cargarVentas()">Filtrar</button>
      <button class="btn-limpiar" onclick="limpiarFiltro()">Ver todo</button>
    </div>
    <button class="btn-exportar" onclick="exportar()">⬇ Exportar Excel</button>
  </div>

  <!-- Tabla (escritorio) -->
  <table class="tabla-reportes">
    <thead>
      <tr>
        <th>#</th>
        <th>Fecha</th>
        <th>Cliente</th>
        <th>Colaborador</th>
        <th>Total</th>
        <th>Comisión</th>
        <th>Detalle</th>
      </tr>
    </thead>
    <tbody id="tabla-ventas">
      <tr><td colspan="7" style="text-align:center;padding:24px;color:#999">Cargando...</td></tr>
    </tbody>
  </table>

  <!-- Tarjetas (móvil) -->
  <div class="cards-reportes" id="cards-reportes"></div>

</div>

<!-- Modal detalle -->
<div class="modal-fondo" id="modal-detalle">
  <div class="modal">
    <h2 id="detalle-titulo">Venta #</h2>
    <div class="modal-sub" id="detalle-sub"></div>
    <table class="detalle-tabla">
      <thead>
        <tr>
          <th>Producto</th>
          <th>Cant.</th>
          <th>Precio unit.</th>
          <th>Total</th>
        </tr>
      </thead>
      <tbody id="detalle-items"></tbody>
    </table>
    <div class="detalle-totales">
      <div class="detalle-fila"><span>Subtotal</span><span id="detalle-subtotal"></span></div>
      <div class="detalle-fila total"><span>Total</span><span id="detalle-total"></span></div>
      <div class="detalle-fila"><span style="color:#999;font-size:13px">Comisión</span><span id="detalle-comision" style="color:#999;font-size:13px"></span></div>
    </div>
    <div class="modal-botones">
      <button class="btn-cancelar" onclick="cerrarDetalle()">Cerrar</button>
    </div>
  </div>
</div>

<script>
  let todasLasVentas = []

  function formatPrecio(v) {
    return '$' + Number(v || 0).toLocaleString('es-CO')
  }

  function formatFecha(f) {
    if (!f) return '—'
    return f.replace('T', ' ').substring(0, 16)
  }

  async function cargarVentas() {
    const desde = document.getElementById('filtro-desde').value
    const hasta = document.getElementById('filtro-hasta').value

    const res = await fetch('/api/ventas')
    todasLasVentas = await res.json()

    let filtradas = todasLasVentas
    if (desde) filtradas = filtradas.filter(v => v.fecha >= desde)
    if (hasta) filtradas = filtradas.filter(v => v.fecha <= hasta + ' 23:59:59')

    document.getElementById('stat-ventas').textContent = filtradas.length
    document.getElementById('stat-ingresos').textContent = formatPrecio(filtradas.reduce((s, v) => s + v.total, 0))
    document.getElementById('stat-comisiones').textContent = formatPrecio(filtradas.reduce((s, v) => s + v.valor_comision, 0))

    const tbody = document.getElementById('tabla-ventas')
    const cardsEl = document.getElementById('cards-reportes')

    if (filtradas.length === 0) {
      tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:24px;color:#999">No hay ventas registradas</td></tr>'
      cardsEl.innerHTML = '<p style="text-align:center;color:#999;padding:24px">No hay ventas registradas</p>'
      return
    }

    tbody.innerHTML = filtradas.map(v => `
      <tr>
        <td>#${v.id}</td>
        <td>${formatFecha(v.fecha)}</td>
        <td>${v.cliente || '—'}</td>
        <td>${v.colaborador || '—'}</td>
        <td style="font-weight:bold;color:#6c3483">${formatPrecio(v.total)}</td>
        <td style="color:#999;font-size:12px">${formatPrecio(v.valor_comision)}</td>
        <td><button class="btn-detalle" onclick="verDetalle(${v.id})">Ver</button></td>
      </tr>
    `).join('')

    cardsEl.innerHTML = filtradas.map(v => `
      <div class="card-reporte">
        <div class="card-reporte-header">
          <span class="card-reporte-id">#${v.id}</span>
          <span class="card-reporte-total">${formatPrecio(v.total)}</span>
        </div>
        <div class="card-info"><span>Fecha</span><span>${formatFecha(v.fecha)}</span></div>
        <div class="card-info"><span>Cliente</span><span>${v.cliente || '—'}</span></div>
        <div class="card-info"><span>Colaborador</span><span>${v.colaborador || '—'}</span></div>
        <div class="card-info"><span>Comisión</span><span style="color:#999">${formatPrecio(v.valor_comision)}</span></div>
        <div class="card-acciones">
          <button class="btn-ver" onclick="verDetalle(${v.id})">Ver detalle</button>
        </div>
      </div>
    `).join('')
  }

  function limpiarFiltro() {
    document.getElementById('filtro-desde').value = ''
    document.getElementById('filtro-hasta').value = ''
    cargarVentas()
  }

  async function verDetalle(id) {
    const res = await fetch(`/api/ventas/${id}`)
    const venta = await res.json()

    document.getElementById('detalle-titulo').textContent = `Venta #${venta.id}`
    document.getElementById('detalle-sub').textContent = `${formatFecha(venta.fecha)} — Cliente: ${venta.cliente || '—'} — Colaborador: ${venta.colaborador || '—'}`

    document.getElementById('detalle-items').innerHTML = venta.detalle.map(d => `
      <tr>
        <td>${d.nombre}</td>
        <td>${d.cantidad}</td>
        <td>${formatPrecio(d.precio_manual || d.precio_unitario)}</td>
        <td>${formatPrecio(d.total)}</td>
      </tr>
    `).join('')

    document.getElementById('detalle-subtotal').textContent = formatPrecio(venta.subtotal)
    document.getElementById('detalle-total').textContent = formatPrecio(venta.total)
    document.getElementById('detalle-comision').textContent = `${venta.porcentaje_comision}% — ${formatPrecio(venta.valor_comision)}`

    document.getElementById('modal-detalle').classList.add('activo')
  }

  function cerrarDetalle() {
    document.getElementById('modal-detalle').classList.remove('activo')
  }

  function exportar() {
    window.location.href = '/api/reportes/exportar'
  }

  cargarVentas()
</script>

</body>
</html>
