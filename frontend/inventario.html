<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
  <title>Inventario Violeta</title>
</head>
<body>

<header>🛍️ Inventario Violeta</header>
<nav class="navbar">
    <a href="/">Productos</a>
    <a href="/inventario.html" class="nav-activo">Inventario</a>
    <a href="/ventas.html">Ventas</a>
    <a href="/reportes.html">Reportes</a>
</nav>

<div class="contenido">
  <div class="barra-top">
    <input type="text" id="busqueda" placeholder="Buscar producto..." oninput="buscar()">
    <div class="botones-top">
      <button class="btn-entrada" onclick="abrirModal('ENTRADA')">+ Registrar entrada</button>
      <button class="btn-salida" onclick="abrirModal('SALIDA')">− Registrar salida</button>
    </div>
  </div>

  <table>
    <thead>
      <tr>
        <th>Código</th>
        <th>Nombre</th>
        <th>Marca</th>
        <th>Entradas</th>
        <th>Salidas</th>
        <th>Stock actual</th>
        <th>Historial</th>
      </tr>
    </thead>
    <tbody id="tabla-inventario">
      <tr><td colspan="7" style="text-align:center;padding:24px;color:#999">Cargando...</td></tr>
    </tbody>
  </table>
  <div class="cards-inventario" id="cards-inventario"></div>
</div>

<!-- Modal entrada/salida -->
<div class="modal-fondo" id="modal-movimiento">
  <div class="modal">
    <h2 id="modal-titulo">Registrar entrada</h2>
    <div class="campo">
      <label>Producto</label>
      <select id="campo-producto"></select>
    </div>
    <div class="campo">
      <label>Cantidad</label>
      <input type="number" id="campo-cantidad" min="1" placeholder="0">
    </div>
    <div class="campo">
      <label>Nota (opcional)</label>
      <textarea id="campo-nota" rows="2" placeholder="Ej: Compra proveedor marzo"></textarea>
    </div>
    <div class="modal-botones">
      <button class="btn-cancelar" onclick="cerrarModal()">Cancelar</button>
      <button id="btn-guardar-movimiento" class="btn-guardar-entrada" onclick="guardarMovimiento()">Guardar entrada</button>
    </div>
  </div>
</div>

<!-- Modal historial -->
<div class="modal-fondo" id="modal-historial">
  <div class="modal">
    <h2 id="historial-titulo">Historial</h2>
    <div id="historial-contenido"></div>
    <div class="modal-botones">
      <button class="btn-cancelar" onclick="cerrarHistorial()">Cerrar</button>
    </div>
  </div>
</div>

<script>
  let tipoMovimiento = 'ENTRADA'
  let todosLosProductos = []

  function stockClase(stock) {
    if (stock <= 0) return 'stock-cero'
    if (stock <= 3) return 'stock-bajo'
    return 'stock-ok'
  }

  async function cargarInventario(q = '') {
    const res = await fetch('/api/inventario')
    todosLosProductos = await res.json()

    let filtrados = todosLosProductos
    if (q) {
      const texto = q.toLowerCase()
      filtrados = todosLosProductos.filter(p =>
        p.nombre.toLowerCase().includes(texto) ||
        p.codigo.toLowerCase().includes(texto) ||
        (p.marca && p.marca.toLowerCase().includes(texto))
      )
    }

    const tbody = document.getElementById('tabla-inventario')

    if (filtrados.length === 0) {
      tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:24px;color:#999">No se encontraron productos</td></tr>'
      return
    }

 tbody.innerHTML = filtrados.map(p => `
<tr>
    <td>${p.codigo}</td>
    <td>${p.nombre}</td>
    <td>${p.marca || '-'}</td>
    <td style="color:#27ae60">${p.entradas}</td>
    <td style="color:#e67e22">${p.salidas}</td>
    <td class="${stockClase(p.stock)}">${p.stock}</td>
    <td>
        <button class="btn-ver" onclick="verHistorial(${p.id}, '${p.nombre}')">
            Ver
        </button>
    </td>
</tr>
`).join('');

// ===== Tarjetas para móvil =====

const cards = document.getElementById("cards-inventario");

cards.innerHTML = filtrados.map(p => `
<div class="card-inventario">

    <div class="card-header">
        <h3>${p.nombre}</h3>
        <p>Código: ${p.codigo}</p>
    </div>

    <div class="card-info">
        <span>Marca</span>
        <span>${p.marca || "-"}</span>
    </div>

    <div class="card-info">
        <span>Entradas</span>
        <span style="color:#27ae60">${p.entradas}</span>
    </div>

    <div class="card-info">
        <span>Salidas</span>
        <span style="color:#e67e22">${p.salidas}</span>
    </div>

    <div class="card-info">
        <span>Stock actual</span>
        <span class="${stockClase(p.stock)}">${p.stock}</span>
    </div>

    <div class="card-acciones">
        <button class="btn-ver" onclick="verHistorial(${p.id}, '${p.nombre}')">
            Ver historial
        </button>
    </div>

</div>
`).join('');

}

  function buscar() {
    cargarInventario(document.getElementById('busqueda').value)
  }

  async function abrirModal(tipo) {
    tipoMovimiento = tipo
    document.getElementById('modal-titulo').textContent = tipo === 'ENTRADA' ? 'Registrar entrada' : 'Registrar salida'
    const btn = document.getElementById('btn-guardar-movimiento')
    btn.textContent = tipo === 'ENTRADA' ? 'Guardar entrada' : 'Guardar salida'
    btn.className = tipo === 'ENTRADA' ? 'btn-guardar-entrada' : 'btn-guardar-salida'

    const res = await fetch('/api/inventario')
    const productos = await res.json()
    const select = document.getElementById('campo-producto')
    select.innerHTML = productos.map(p => `<option value="${p.id}">${p.nombre} (stock: ${p.stock})</option>`).join('')

    document.getElementById('campo-cantidad').value = ''
    document.getElementById('campo-nota').value = ''
    document.getElementById('modal-movimiento').classList.add('activo')
  }

  function cerrarModal() {
    document.getElementById('modal-movimiento').classList.remove('activo')
  }

  async function guardarMovimiento() {
    const producto_id = document.getElementById('campo-producto').value
    const cantidad = parseInt(document.getElementById('campo-cantidad').value)
    const nota = document.getElementById('campo-nota').value

    if (!cantidad || cantidad <= 0) {
      alert('Ingresa una cantidad válida')
      return
    }

    const endpoint = tipoMovimiento === 'ENTRADA' ? '/api/inventario/entrada' : '/api/inventario/salida'
    const res = await fetch(endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ producto_id, cantidad, nota })
    })

    const data = await res.json()

    if (!res.ok) {
      alert(data.error)
      return
    }

    cerrarModal()
    cargarInventario()
  }

  async function verHistorial(id, nombre) {
    const res = await fetch(`/api/inventario/movimientos/${id}`)
    const movimientos = await res.json()

    document.getElementById('historial-titulo').textContent = `Historial — ${nombre}`

    if (movimientos.length === 0) {
      document.getElementById('historial-contenido').innerHTML = '<p style="color:#999;font-size:13px;text-align:center;padding:16px">Sin movimientos registrados</p>'
    } else {
      document.getElementById('historial-contenido').innerHTML = movimientos.map(m => `
        <div class="historial-item">
          <span class="badge-${m.tipo.toLowerCase()}">${m.tipo}</span>
          <span>${m.nota || '—'}</span>
          <span style="font-weight:bold">${m.tipo === 'ENTRADA' ? '+' : '-'}${m.cantidad}</span>
          <span style="color:#999;font-size:12px">${m.fecha}</span>
        </div>
      `).join('')
    }
    document.getElementById('modal-historial').classList.add('activo')
  }

  function cerrarHistorial() {
    document.getElementById('modal-historial').classList.remove('activo')
  }

  cargarInventario()
</script>

</body>
</html>
